[defaults]
# Ansible Configuration for Palo Alto Networks Firewall Upgrades

# Inventory location
inventory = inventory/palo_alto.yml

# Disable host key checking (optional, set to true if hosts not in known_hosts)
host_key_checking = False

# Timeout for network operations
timeout = 30

# Keep remote files for debugging
# keep_remote_files = False

# Show task timing
callback_whitelist = profile_tasks

# Gather facts (can be slow on some firewalls)
gathering = smart
fact_caching = jsonfile
fact_caching_connection = .ansible_cache
fact_caching_timeout = 86400

# Parallel execution control
# Uncomment to run multiple playbook tasks in parallel
# forks = 5

# SSH timeout
connect_timeout = 30

# Ansible retries for failed tasks
retries = 3

# Output formatting
force_color = True
# terminal_plugin_debug = False

# Vault settings
# If using vault password file, uncomment:
# vault_password_file = ~/.ansible/vault_pass
# Or set via command line: --vault-password-file ~/.ansible/vault_pass

# Logging
# log_path = ./ansible.log

# Privilege escalation (usually not needed for API-based operations)
# become = no
# become_user = root
# become_method = sudo

[privilege_escalation]
# Not typically needed for firewall API access
become = no

[ssh_connection]
# SSH settings (for any SSH-based operations)
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
pipelining = True

[default_network_plugin]
# Network plugin settings
network_os = panos

# USAGE:
# 1. Place this file in the root directory of your playbook project
# 2. Ansible will automatically use it when running playbooks in this directory
# 3. Or set ANSIBLE_CONFIG environment variable: export ANSIBLE_CONFIG=ansible.cfg
#
# KEY SETTINGS EXPLAINED:
#
# gathering = smart
#   Only gather facts when needed (faster playbook execution)
#
# fact_caching = jsonfile
#   Cache facts locally to avoid re-gathering on subsequent runs
#
# host_key_checking = False
#   Skip SSH host key verification (useful for lab/testing)
#   For production, set to True and add hosts to known_hosts first
#
# retries = 3
#   Automatic retry of failed tasks (helps with transient network issues)
#
# timeout = 30
#   Network operation timeout in seconds
#
# vault_password_file = ~/.ansible/vault_pass
#   Automatically use vault password from file (required for CI/CD)
