---
# Palo Alto Networks Firewall Upgrade - Vault Credentials Template
#
# INSTRUCTIONS:
# 1. Copy this file to group_vars/palo_alto_firewalls_vault.yml
# 2. Fill in your actual credentials below
# 3. Encrypt with: ansible-vault encrypt group_vars/palo_alto_firewalls_vault.yml
# 4. When running playbook with vault: --vault-password-file ~/.ansible/vault_pass
#
# Alternatively, you can:
# - Set these as environment variables (recommended for CI/CD)
# - Store credentials in a secure credential manager like HashiCorp Vault

# Palo Alto API credentials
vault_panos_username: "admin"
vault_panos_password: "YourFirewallPassword123!"

# Palo Alto Networks Support Portal credentials (for firmware downloads)
vault_palo_alto_portal_username: "your_portal_email@your_company.com"
vault_palo_alto_portal_password: "YourPortalPassword456!"

# Optional: Panorama credentials (if using Panorama-managed firewalls)
vault_panorama_username: "admin"
vault_panorama_password: "YourPanoramaPassword789!"

# Optional: Proxy credentials (if firewall must go through proxy for firmware download)
vault_proxy_username: ""
vault_proxy_password: ""
vault_proxy_url: ""

# HOW TO USE THIS FILE:
#
# 1. Create the vault file:
#    cp credentials_vault_template.yml group_vars/palo_alto_firewalls_vault.yml
#
# 2. Edit with your actual credentials (DO NOT commit this file unencrypted!)
#
# 3. Encrypt the vault file:
#    ansible-vault encrypt group_vars/palo_alto_firewalls_vault.yml
#
# 4. Create a vault password file (for automation):
#    echo "your_vault_password" > ~/.ansible/vault_pass
#    chmod 600 ~/.ansible/vault_pass
#
# 5. Add to ansible.cfg to use vault password file automatically:
#    [defaults]
#    vault_password_file = ~/.ansible/vault_pass
#
# 6. Include in your playbook:
#    - Add to playbook vars_files:
#      vars_files:
#        - "group_vars/palo_alto_firewalls.yml"
#        - "group_vars/palo_alto_firewalls_vault.yml"  # This file (encrypted)
#
# 7. Run playbook with vault:
#    ansible-playbook palo_alto_firewall_upgrade.yml \
#      -i inventory/palo_alto.yml \
#      --ask-vault-pass
#
# SECURITY BEST PRACTICES:
#
# 1. NEVER commit unencrypted vault files to version control
# 2. Use strong vault passwords (25+ characters recommended)
# 3. Rotate credentials periodically
# 4. Restrict file permissions: chmod 600 *.yml
# 5. Use different credentials for different environments (prod, staging, lab)
# 6. Consider using a secrets management system for production (HashiCorp Vault, AWS Secrets Manager, etc.)
# 7. Audit access to vault and backup files
# 8. Store vault password file in a secure location
# 9. Never share vault passwords via email or Slack
#
# ALTERNATIVE: Environment Variables (Recommended for CI/CD)
#
# Instead of using a vault file, you can export credentials as environment variables:
#
#   export PANOS_USERNAME=admin
#   export PANOS_PASSWORD=YourPassword123
#   export PALO_ALTO_PORTAL_USERNAME=your_email@company.com
#   export PALO_ALTO_PORTAL_PASSWORD=YourPortalPassword456
#
# Then in your playbook, reference them:
#   panos_username: "{{ lookup('env','PANOS_USERNAME') }}"
#   panos_password: "{{ lookup('env','PANOS_PASSWORD') }}"
#
# This is cleaner for CI/CD pipelines and keeps secrets out of files entirely.
